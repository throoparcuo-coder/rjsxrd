name: Update VPN Configs

on:
  schedule:
    - cron: "0 0 */2 * *"  # Once every 2 days at midnight UTC
  workflow_dispatch:

jobs:
  update-files:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    permissions:
      contents: write

    concurrency:
      group: vpn-config-update
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29  # v4.1.6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@0b93645e92151f777d924e8c48dc00eee2ebc3ea  # v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: cd source && pip install --no-cache-dir -r requirements.txt

      - name: Run script with git mode
        id: run_script
        env:
          PROXY_REQUIRED: false  # GitHub Actions runners don't have proxy
        run: |
          cd source && python main.py --use-git --no-proxy-check
        continue-on-error: true

      - name: Check script result
        if: steps.run_script.outcome == 'failure'
        run: |
          echo "::error::VPN config update failed"
          exit 1
