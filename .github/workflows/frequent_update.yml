name: Daily Sync and Clean

on:
  schedule:
    # Runs automatically every day at midnight (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the workflow from the Actions tab

permissions:
  contents: write # Required to allow GitHub Actions to push commits back to your fork

jobs:
  sync-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so we can merge properly

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with Upstream (Original Repo)
        run: |
          # REPLACE the URL below with the original repository you forked from
          git remote add upstream https://github.com/whoahaow/rjsxrd.git
          git fetch upstream
          
          # Merges the changes from upstream/main into your fork.
          # (If the original repo uses 'master', change 'upstream/main' to 'upstream/master')
          # '-X theirs' ensures that if there are conflicts, the upstream original wins.
          git merge upstream/main -X theirs --no-edit

      - name: Clean .txt files
        run: |
          # Finds all .txt files recursively and runs 'sed' to process them.
          # - '/^[[:space:]]*$/d' deletes empty lines (and lines with only spaces/carriage returns)
          # - '/^[[:space:]]*#/d' deletes lines starting with '#' (even if preceded by spaces)
          find . -type f -name "*.txt" -exec sed -i '/^[[:space:]]*$/d; /^[[:space:]]*#/d' {} +
          
      - name: Commit and Push changes
        run: |
          git add .
          
          # Check if there are any changes to commit before trying to push
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated daily sync and cleanup of .txt files"
            git push
          else
            echo "No changes found to commit."
          fi
